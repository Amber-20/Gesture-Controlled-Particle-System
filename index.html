<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* CANVAS (Full Screen Background) */
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh;
        }

        /* THE CAMERA (Bottom Right Corner) */
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px; 
            height: 160px;
            border: 2px solid rgba(0, 255, 255, 0.5);
            border-radius: 12px;
            overflow: hidden;
            z-index: 10;
            transform: scaleX(-1); /* Mirror */
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
            background: #111;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.5rem; text-shadow: 0 0 10px cyan; }
        p { font-size: 0.9rem; color: #aaa; margin: 5px 0; }
        .status { color: #0f0; font-weight: bold; }
        .highlight { color: cyan; font-weight: bold; }
    </style>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<div id="ui">
    <h1>Neural Dust v3</h1>
    <p>Status: <span id="status-text" style="color:yellow">Loading Web Cam...</span></p>
    <p>✋ <span class="highlight">Pinch</span> to Expand | ✊ <span class="highlight">Fist</span> to Switch Shape</p>
    <p>Current Shape: <span id="shape-name" class="status">Sphere</span></p>
</div>

<div id="video-container">
    <video id="input_video"></video>
</div>

<script>
/**
 * PART 1: THREE.JS SETUP
 */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.002);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 60;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Optimized count for speed
const PARTICLE_COUNT = 10000;
const particlesGeometry = new THREE.BufferGeometry();
const particlesMaterial = new THREE.PointsMaterial({
    size: 0.6,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.85
});

// Attributes
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
const randomOffsets = new Float32Array(PARTICLE_COUNT * 3);

// Initialize random positions
for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 100;
    targetPositions[i] = positions[i];
    colors[i] = 1;
    randomOffsets[i] = Math.random() * Math.PI * 2;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particleSystem);

/**
 * PART 2: SHAPE GENERATORS
 */
const Shapes = {
    SPHERE: 0,
    FLOWER: 1,
    HEART: 2,
    DNA: 3,
    TORUS: 4,
    SATURN: 5
};
let currentShape = Shapes.SPHERE;
const shapeNames = ["Sphere", "Cosmic Flower", "Heart", "DNA Helix", "Torus", "Saturn"];

function getSpherePoint(r) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    return {
        x: r * Math.sin(phi) * Math.cos(theta),
        y: r * Math.sin(phi) * Math.sin(theta),
        z: r * Math.cos(phi)
    };
}

function calculateTargetShape(type) {
    const positions = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        let x, y, z;
        
        if (type === Shapes.SPHERE) {
            const p = getSpherePoint(22);
            x = p.x; y = p.y; z = p.z;
        } 
        else if (type === Shapes.FLOWER) {
            const theta = i * 0.1;
            const r = 22 * Math.cos(2.5 * theta) * Math.sin(theta * 0.1); 
            x = r * Math.cos(theta);
            y = r * Math.sin(theta);
            z = (i / PARTICLE_COUNT) * 40 - 20; 
        }
        else if (type === Shapes.HEART) {
            const t = (i / PARTICLE_COUNT) * Math.PI * 20;
            const r = 1.0; 
            x = r * 16 * Math.pow(Math.sin(t), 3);
            y = r * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
            z = (Math.random() - 0.5) * 8; 
            y += 5; 
        }
        else if (type === Shapes.DNA) {
            const t = (i / PARTICLE_COUNT) * Math.PI * 10;
            const radius = 9;
            const height = 60;
            if (i % 2 === 0) {
                x = radius * Math.cos(t);
                z = radius * Math.sin(t);
            } else {
                x = radius * Math.cos(t + Math.PI);
                z = radius * Math.sin(t + Math.PI);
            }
            y = (i / PARTICLE_COUNT) * height - (height/2);
            x += (Math.random()-0.5) * 1.5;
            z += (Math.random()-0.5) * 1.5;
        }
        else if (type === Shapes.TORUS) {
            const u = Math.random() * Math.PI * 2;
            const v = Math.random() * Math.PI * 2;
            const R = 18; // Major
            const r = 7;  // Minor
            x = (R + r * Math.cos(v)) * Math.cos(u);
            y = (R + r * Math.cos(v)) * Math.sin(u);
            z = r * Math.sin(v);
        }
        else if (type === Shapes.SATURN) {
            if (i < PARTICLE_COUNT * 0.6) {
                const p = getSpherePoint(13);
                x = p.x; y = p.y; z = p.z;
            } else {
                const angle = Math.random() * Math.PI * 2;
                const rad = 20 + Math.random() * 12;
                x = rad * Math.cos(angle);
                z = rad * Math.sin(angle);
                y = (Math.random() - 0.5) * 0.5;
                const tilt = 0.5;
                const ty = y * Math.cos(tilt) - z * Math.sin(tilt);
                const tz = y * Math.sin(tilt) + z * Math.cos(tilt);
                y = ty; z = tz;
            }
        }

        positions.push(x, y, z);
    }
    return positions;
}

let targets = calculateTargetShape(currentShape);

function switchShape(newShape) {
    if (currentShape === newShape) return;
    currentShape = newShape;
    document.getElementById('shape-name').innerText = shapeNames[currentShape];
    targets = calculateTargetShape(currentShape);
}

/**
 * PART 3: MEDIAPIPE HAND TRACKING
 */
const videoElement = document.getElementById('input_video');
const statusText = document.getElementById('status-text');

let handVisible = false;
let pinchDistance = 0; 
let handX = 0.5; 
let handY = 0.5; 
let isFist = false;
let lastFistState = false; 

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handVisible = true;
        statusText.innerText = "Tracking Hand";
        statusText.style.color = "#0f0";

        const landmarks = results.multiHandLandmarks[0];
        
        const wrist = landmarks[0];
        handX = 1 - wrist.x; 
        handY = 1 - wrist.y;

        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];
        const distance = Math.sqrt(
            Math.pow(thumbTip.x - indexTip.x, 2) + 
            Math.pow(thumbTip.y - indexTip.y, 2)
        );
        pinchDistance = Math.min(Math.max((distance - 0.02) * 5, 0), 1) + 0.5;

        const pinkyTip = landmarks[20];
        const pinkyDist = Math.sqrt(Math.pow(pinkyTip.x - wrist.x, 2) + Math.pow(pinkyTip.y - wrist.y, 2));
        isFist = pinkyDist < 0.15;

    } else {
        handVisible = false;
        statusText.innerText = "No Hand Detected";
        statusText.style.color = "red";
    }
}

const hands = new Hands({locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
}});

hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
});
hands.onResults(onResults);

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => {
        await hands.send({image: videoElement});
    },
    width: 640,
    height: 480
});
cameraUtils.start();


/**
 * PART 4: ANIMATION LOOP
 */
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();
    const positionsAttr = particleSystem.geometry.attributes.position;
    const colorsAttr = particleSystem.geometry.attributes.color;

    // --- Interaction ---
    
    // Switch Shape Trigger
    if (isFist && !lastFistState) {
        let nextShape = (currentShape + 1) % 6;
        switchShape(nextShape);
    }
    lastFistState = isFist;

    // Rotation - SPEED INCREASED
    if (handVisible) {
        const targetRotY = (handX - 0.5) * 1.5;
        const targetRotX = (handY - 0.5) * 1.5;
        // Increased from 0.05 to 0.15 for snappier response
        particleSystem.rotation.y += (targetRotY - particleSystem.rotation.y) * 0.15;
        particleSystem.rotation.x += (targetRotX - particleSystem.rotation.x) * 0.15;
    } else {
        particleSystem.rotation.y += 0.005; // Faster auto-rotation
        particleSystem.rotation.x = THREE.MathUtils.lerp(particleSystem.rotation.x, 0, 0.1);
    }

    // --- Particles ---

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const i3 = i * 3;
        const tx = targets[i3];
        const ty = targets[i3 + 1];
        const tz = targets[i3 + 2];

        const scale = handVisible ? pinchDistance * 1.5 : 1 + Math.sin(time*1.5)*0.1; // Faster breath
        
        const noiseX = Math.sin(time * 3.0 + randomOffsets[i3]) * 0.2; // Faster noise shimmer
        const noiseY = Math.cos(time * 4.0 + randomOffsets[i3+1]) * 0.2;
        const noiseZ = Math.sin(time * 3.5 + randomOffsets[i3+2]) * 0.2;

        // SPEED INCREASED: Lerp factor changed from 0.03 to 0.1
        positionsAttr.array[i3]     += (tx * scale - positionsAttr.array[i3]) * 0.1 + noiseX * 0.1;
        positionsAttr.array[i3 + 1] += (ty * scale - positionsAttr.array[i3 + 1]) * 0.1 + noiseY * 0.1;
        positionsAttr.array[i3 + 2] += (tz * scale - positionsAttr.array[i3 + 2]) * 0.1 + noiseZ * 0.1;
        
        // Colors
        const dist = Math.sqrt(positionsAttr.array[i3]**2 + positionsAttr.array[i3+1]**2);
        // Faster color cycling
        const hue = (time * 0.2 + (i / PARTICLE_COUNT) * 0.5 + dist/50) % 1;
        
        const color = new THREE.Color();
        color.setHSL(hue, 1.0, 0.6);
        colorsAttr.array[i3] = color.r;
        colorsAttr.array[i3 + 1] = color.g;
        colorsAttr.array[i3 + 2] = color.b;
    }

    positionsAttr.needsUpdate = true;
    colorsAttr.needsUpdate = true;

    renderer.render(scene, camera);
}

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
